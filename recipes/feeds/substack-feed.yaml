name: "Substack Discover Feed"
description: "Extract trending posts from Substack discover with author and publication"
version: 2
type: query

auth:
  required: false
  type: none
  strategy: public
  notes: "Substack discover page is public. Some posts may require subscription to read full content."

config:
  default_timeout_ms: 60000
  default_on_error: continue
scripts:
  extract:
    async: true
    body: |
      (async () => {
        const results = [];
        const seen = new Set();
        // Find Substack post links
        for (const a of document.querySelectorAll('a')) {
          const href = a.getAttribute('href') || '';
          const text = a.textContent.trim();
          if (text.length < 10 || text.length > 200 || seen.has(text)) continue;
          // Substack post links: xxx.substack.com/p/slug
          if (!href.match(/\.substack\.com\/p\//)) continue;
          seen.add(text);
          const id = href.match(/\/p\/([a-z0-9-]+)/)?.[1] || text.substring(0, 40);
          results.push({ id, title: text, url: href, preview: '' });
        }

        // Fetch top 10 articles for preview (substack is discovery, not deep reading)
        const top = results.slice(0, 10);
        const final = [];
        for (let i = 0; i < top.length; i += 5) {
          const batch = top.slice(i, i + 5);
          const fetches = batch.map(async (article) => {
            try {
              const resp = await fetch(article.url, { credentials: 'include' });
              const html = await resp.text();
              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');
              // Substack has a specific structure
              const bodyEl = doc.querySelector('.post-content') ||
                             doc.querySelector('[class*="article-content"]') ||
                             doc.querySelector('article') ||
                             doc.querySelector('main');
              let preview = '';
              if (bodyEl) {
                const clone = bodyEl.cloneNode(true);
                clone.querySelectorAll('style, script, .paywall, .newsletter-prompt, .upgrade-prompt, nav, header, footer').forEach(s => s.remove());
                preview = clone.textContent.trim().replace(/\s+/g, ' ').substring(0, 500);
              }
              // Fallback to meta description
              if (!preview) {
                const metaDesc = doc.querySelector('meta[name="description"]');
                if (metaDesc) {
                  preview = metaDesc.getAttribute('content') || '';
                }
              }
              return { ...article, preview };
            } catch (e) {
              return article;
            }
          });
          final.push(...await Promise.all(fetches));
        }
        // Append remaining without preview
        for (let i = 10; i < results.length; i++) final.push(results[i]);
        return JSON.stringify(final);
      })()
steps:
  - goto: "https://substack.com/discover"
    wait_for: "body"
  - wait: 5000
  - eval: { ref: extract, save_as: items }
  - output: { items: "{{ items }}" }
