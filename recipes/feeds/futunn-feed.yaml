name: "Futunn Feed"
description: "Extract financial news from Futunn (富途) with full content"
version: 3
type: query

auth:
  required: false
  type: none
  strategy: public
  notes: "Futunn is a public financial news site."

config:
  default_timeout_ms: 60000
  default_on_error: continue
scripts:
  extract:
    async: true
    body: |
      (async () => {
        const results = [];
        const seen = new Set();
        // Find news article links
        for (const a of document.querySelectorAll('a')) {
          const href = a.getAttribute('href') || '';
          const text = a.textContent.trim();
          if (text.length < 8 || text.length > 150 || seen.has(text)) continue;
          const isNews = href.includes('/news-detail/') || href.includes('/news/') ||
            href.includes('/post/') || href.match(/\/\d{8,}/);
          if (!isNews) continue;
          seen.add(text);
          const url = href.startsWith('http') ? href : 'https://www.futunn.com' + href;
          const idMatch = href.match(/(\d{8,})/);
          const id = idMatch ? idMatch[1] : text.substring(0, 30);
          results.push({ id, title: text, url, preview: '' });
        }

        // Fetch top 15 articles for preview
        const top = results.slice(0, 15);
        const final = [];
        for (let i = 0; i < top.length; i += 5) {
          const batch = top.slice(i, i + 5);
          const fetches = batch.map(async (article) => {
            try {
              const resp = await fetch(article.url, { credentials: 'include' });
              const html = await resp.text();
              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');
              // Try multiple selectors for article content
              const bodyEl = doc.querySelector('[class*="article-content"]') ||
                             doc.querySelector('[class*="news-content"]') ||
                             doc.querySelector('[class*="post-content"]') ||
                             doc.querySelector('article') ||
                             doc.querySelector('main') ||
                             doc.querySelector('.content');
              let preview = '';
              if (bodyEl) {
                const clone = bodyEl.cloneNode(true);
                clone.querySelectorAll('style, script, .ads, .related, nav, header, footer').forEach(s => s.remove());
                preview = clone.textContent.trim().replace(/\s+/g, ' ').substring(0, 500);
              }
              // Fallback to meta description
              if (!preview) {
                const metaDesc = doc.querySelector('meta[name="description"]');
                if (metaDesc) {
                  preview = metaDesc.getAttribute('content') || '';
                }
              }
              return { ...article, preview };
            } catch (e) {
              return article;
            }
          });
          final.push(...await Promise.all(fetches));
        }
        // Append remaining without preview
        for (let i = 15; i < results.length; i++) final.push(results[i]);
        return JSON.stringify(final);
      })()
steps:
  - goto: "https://www.futunn.com/"
    wait_for: "body"
  - wait: 5000
  - eval: { ref: extract, save_as: items }
  - output: { items: "{{ items }}" }
