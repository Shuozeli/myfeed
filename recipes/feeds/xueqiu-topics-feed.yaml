name: "Xueqiu Topics Feed"
description: "Extract today's hot discussions from Xueqiu"
version: 2
type: query

auth:
  required: true
  type: cookie
  strategy: cookie
  notes: "Xueqiu requires login for hot discussions."

config:
  default_timeout_ms: 20000
  default_on_error: continue
scripts:
  extract: |
    (() => {
      const results = [];
      const seen = new Set();
      for (const a of document.querySelectorAll('a')) {
        const href = a.getAttribute('href') || '';
        const text = a.textContent.trim();
        // Match status/post links or SP (special post) links
        if (text.length < 8 || text.length > 200 || seen.has(text)) continue;
        const isContent = href.match(/\/(SP|status)\/\d+/) ||
          (href.startsWith('/') && href.match(/\/\d{7,}/));
        if (!isContent) continue;
        seen.add(text);
        const url = href.startsWith('http') ? href : 'https://xueqiu.com' + href;
        const idMatch = href.match(/(\d{7,})/);
        const id = idMatch ? idMatch[1] : text.substring(0, 30);
        results.push({ id, title: text.substring(0, 100), url, preview: text.substring(0, 500) });
      }
      return JSON.stringify(results);
    })()
steps:
  - goto: "https://xueqiu.com/today"
    wait_for: "body"
  - wait: 5000
  - eval: { ref: extract, save_as: items }
  - output: { items: "{{ items }}" }
