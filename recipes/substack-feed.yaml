name: "Substack Discover Feed"
description: "Extract trending posts from Substack discover"
version: 1
type: query
config:
  default_timeout_ms: 20000
  default_on_error: continue
scripts:
  extract: |
    (() => {
      const results = [];
      const seen = new Set();
      for (const a of document.querySelectorAll('a')) {
        const href = a.getAttribute('href') || '';
        const text = a.textContent.trim();
        if (text.length < 10 || text.length > 200 || seen.has(text)) continue;
        // Substack post links: xxx.substack.com/p/slug
        if (!href.match(/\.substack\.com\/p\//)) continue;
        seen.add(text);
        const id = href.match(/\/p\/([a-z0-9-]+)/)?.[1] || text.substring(0, 40);
        results.push({ id, title: text, url: href, preview: '' });
      }
      return JSON.stringify(results);
    })()
steps:
  - goto: "https://substack.com/discover"
    wait_for: "body"
  - wait: 5000
  - eval: { ref: extract, save_as: items }
  - output: { items: "{{ items }}" }
