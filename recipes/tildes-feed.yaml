name: "Tildes Feed"
description: "Extract topics from Tildes"
version: 1
type: query
config:
  default_timeout_ms: 20000
  default_on_error: continue
scripts:
  extract: |
    (() => {
      const results = [];
      const topics = document.querySelectorAll('article.topic, .topic-listing article');
      for (const topic of topics) {
        try {
          const titleEl = topic.querySelector('h1 a, .topic-title a, h2 a, a[href*="/~"]');
          if (!titleEl) continue;
          const title = titleEl.textContent.trim();
          const href = titleEl.getAttribute('href') || '';
          if (title.length < 5) continue;
          const url = href.startsWith('http') ? href : 'https://tildes.net' + href;
          const idMatch = href.match(/\/([a-z0-9]+)$/);
          const id = idMatch ? idMatch[1] : title.substring(0, 40);
          const metaEl = topic.querySelector('.topic-info, [class*="meta"]');
          const preview = metaEl ? metaEl.textContent.trim().substring(0, 200) : '';
          results.push({ id, title, url, preview });
        } catch(e) {}
      }
      return JSON.stringify(results);
    })()
steps:
  - goto: "https://tildes.net/"
    wait_for: "article, [class*='topic']"
  - wait: 2000
  - eval: { ref: extract, save_as: items }
  - output: { items: "{{ items }}" }
