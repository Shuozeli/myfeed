name: "1point3acres Thread Explore"
description: "Explore a single thread page structure"
version: 1
type: query

config:
  default_timeout_ms: 20000

scripts:
  dump_thread: |
    (() => {
      const result = {
        url: window.location.href,
        title: document.title,
        ids_with_post: [],
        classes_with_post: [],
        selectors_found: [],
        first_post_text: ''
      };

      document.querySelectorAll('[id]').forEach(el => {
        if (el.id.includes('post')) result.ids_with_post.push(el.id);
      });
      result.ids_with_post = result.ids_with_post.slice(0, 15);

      const seen = new Set();
      document.querySelectorAll('[class]').forEach(el => {
        const c = typeof el.className === 'string' ? el.className : '';
        if ((c.includes('post') || c.includes('message') || c.includes('content') || c.includes('t_f'))
            && !seen.has(c)) {
          seen.add(c);
          result.classes_with_post.push({
            class: c.substring(0, 100),
            tag: el.tagName,
            text: el.textContent.trim().substring(0, 200)
          });
        }
      });
      result.classes_with_post = result.classes_with_post.slice(0, 10);

      const checks = [
        '.t_f', '.t_fsz', '.pct', '.pcb', '[id^="postmessage_"]',
        '.message', '.post_body', '.postcontent', '.plhin',
        'td.t_f', 'article', '.threadContent'
      ];
      for (const sel of checks) {
        try {
          const els = document.querySelectorAll(sel);
          if (els.length > 0) {
            result.selectors_found.push({
              selector: sel,
              count: els.length,
              first_text: els[0].textContent.trim().substring(0, 300)
            });
          }
        } catch(e) {}
      }

      // Try common Discuz first post selector
      const firstPost = document.querySelector('[id^="postmessage_"]') || document.querySelector('.t_f') || document.querySelector('.pct');
      if (firstPost) {
        result.first_post_text = firstPost.textContent.trim().substring(0, 500);
      }

      return JSON.stringify(result, null, 2);
    })()

steps:
  - goto: "https://www.1point3acres.com/bbs/thread-1169585-1-1.html"
    wait_for: "body"
    timeout_ms: 20000

  - wait: 3000

  - eval:
      ref: dump_thread
      save_as: structure

  - output:
      structure: "{{ structure }}"
