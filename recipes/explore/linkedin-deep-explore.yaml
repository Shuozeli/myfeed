name: "LinkedIn Deep Explore"
version: 1
type: query

config:
  default_timeout_ms: 20000

scripts:
  inspect: |
    (() => {
      const result = {
        url: window.location.href,
        title: document.title,
        selectors: [],
        divWithDataUrn: [],
        allTagsWithContent: []
      };

      const checks = [
        '.feed-shared-update-v2', '[data-urn]', '.occludable-update',
        '[class*="feed"]', '[class*="update"]', '[class*="post"]',
        '[class*="card"]', '.scaffold-finite-scroll__content',
        'main', '[role="main"]', 'article',
        '[class*="artdeco"]', '[class*="ember"]',
        'div[data-id]', '[class*="FeedUpdate"]', '[class*="Update"]'
      ];
      for (const sel of checks) {
        try {
          const c = document.querySelectorAll(sel).length;
          if (c > 0) result.selectors.push({ sel, c });
        } catch(e) {}
      }

      // Find elements with data-urn
      document.querySelectorAll('[data-urn]').forEach(el => {
        result.divWithDataUrn.push({
          tag: el.tagName,
          urn: el.getAttribute('data-urn').substring(0, 80),
          classes: (el.className || '').substring(0, 100)
        });
      });
      result.divWithDataUrn = result.divWithDataUrn.slice(0, 5);

      // Find any substantial text blocks in main content
      const main = document.querySelector('main') || document.body;
      const divs = main.querySelectorAll('div, article, section');
      for (const d of divs) {
        const text = d.textContent.trim();
        if (text.length > 100 && text.length < 2000 && d.children.length < 20) {
          result.allTagsWithContent.push({
            tag: d.tagName,
            classes: (d.className || '').substring(0, 150),
            text: text.substring(0, 200)
          });
          if (result.allTagsWithContent.length >= 5) break;
        }
      }

      return JSON.stringify(result, null, 2);
    })()

steps:
  - goto: "https://www.linkedin.com/feed/"
    wait_for: "body"
  - wait: 5000
  - eval: { ref: inspect, save_as: structure }
  - output: { structure: "{{ structure }}" }
