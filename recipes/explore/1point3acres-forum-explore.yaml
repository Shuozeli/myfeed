name: "1point3acres Forum Explore"
description: "Explore 1point3acres forum (bbs) HTML structure"
version: 1
type: query

config:
  default_timeout_ms: 20000

scripts:
  dump_structure: |
    (() => {
      const result = {
        url: window.location.href,
        title: document.title,
        selectors_found: [],
        sample_elements: []
      };

      const checks = [
        'article', '.post', '.thread', '.topic',
        'table', 'table tbody tr', 'table tr td a',
        '[class*="thread"]', '[class*="post"]', '[class*="topic"]',
        '[class*="forum"]', '[class*="card"]', '[class*="item"]',
        '[class*="list"]', '[class*="feed"]',
        'li a', '.bm_c', '.threadlist',
        'a[href*="thread"]', 'a[href*="forum"]',
        'h2 a', 'h3 a', '.subject', '.title'
      ];
      for (const sel of checks) {
        try {
          const count = document.querySelectorAll(sel).length;
          if (count > 0) result.selectors_found.push({ selector: sel, count });
        } catch (e) {}
      }

      // Try to find thread-like content
      const candidates = document.querySelectorAll(
        'a[href*="thread"], [class*="thread"], [class*="topic"], [class*="post"], article, table tbody tr'
      );
      for (let i = 0; i < Math.min(candidates.length, 5); i++) {
        const el = candidates[i];
        result.sample_elements.push({
          tag: el.tagName,
          id: el.id || '',
          classes: (typeof el.className === 'string' ? el.className : '').substring(0, 200),
          href: el.getAttribute('href') || '',
          text_preview: el.textContent.trim().substring(0, 300),
          inner_html_preview: el.innerHTML.substring(0, 600)
        });
      }

      return JSON.stringify(result, null, 2);
    })()

steps:
  - goto: "https://www.1point3acres.com/bbs/"
    wait_for: "body"
    timeout_ms: 20000

  - wait: 5000

  - eval:
      ref: dump_structure
      save_as: structure

  - output:
      structure: "{{ structure }}"
