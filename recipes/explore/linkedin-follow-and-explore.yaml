name: "LinkedIn Follow and Explore"
description: "Follow some tech companies on LinkedIn then explore the feed"
version: 1
type: mutation

config:
  default_timeout_ms: 30000
  default_on_error: continue

scripts:
  follow_pages: |
    (async () => {
      // Navigate to some tech company pages and click Follow
      const pages = [
        'https://www.linkedin.com/company/google/',
        'https://www.linkedin.com/company/meta/',
        'https://www.linkedin.com/company/anthropic/',
        'https://www.linkedin.com/company/openai/',
        'https://www.linkedin.com/company/nvidia/'
      ];
      const results = [];
      for (const page of pages) {
        try {
          const resp = await fetch(page, { credentials: 'include' });
          results.push({ page, status: resp.status });
        } catch(e) {
          results.push({ page, error: e.message });
        }
      }
      return JSON.stringify(results);
    })()

  inspect_feed: |
    (() => {
      const result = {
        url: window.location.href,
        title: document.title,
        selectors: [],
        posts: []
      };

      // Check all potential selectors
      const checks = [
        '[data-urn]', 'article', '[class*="feed"]',
        '[class*="update"]', '[class*="post"]',
        'a[href*="/posts/"]', 'a[href*="/feed/update/"]',
        'span[dir="ltr"]', '[data-display-contents]',
        '[data-testid]', 'img[alt]'
      ];
      for (const sel of checks) {
        try {
          const c = document.querySelectorAll(sel).length;
          if (c > 0) result.selectors.push({ sel, c });
        } catch(e) {}
      }

      // Find post links
      const postLinks = document.querySelectorAll('a[href*="/posts/"], a[href*="/feed/update/"]');
      for (const a of [...postLinks].slice(0, 5)) {
        const parent = a.closest('div[data-display-contents]') || a.parentElement.parentElement.parentElement;
        result.posts.push({
          href: a.getAttribute('href').substring(0, 100),
          parentText: parent ? parent.textContent.trim().substring(0, 200) : '',
          parentClasses: parent ? (parent.className || '').substring(0, 100) : ''
        });
      }

      return JSON.stringify(result, null, 2);
    })()

steps:
  - goto: "https://www.linkedin.com/feed/"
    wait_for: "main"
  - wait: 8000
  - eval: { ref: inspect_feed, save_as: structure }
  - output: { structure: "{{ structure }}" }
