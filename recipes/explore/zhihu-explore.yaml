name: "Zhihu Explore"
description: "Explore Zhihu's HTML structure for feed extraction"
version: 1
type: query

params:
  url:
    type: string
    required: false
    default: "https://www.zhihu.com"
    description: "Zhihu URL to explore"

scripts:
  dump_structure: |
    (() => {
      const cards = document.querySelectorAll('.Card, .Feed, .ContentItem, .TopstoryItem');
      const result = {
        card_count: cards.length,
        selectors_found: [],
        sample_card: null
      };

      if (cards.length > 0) {
        const first = cards[0];
        result.sample_card = {
          tag: first.tagName,
          id: first.id,
          classes: first.className,
          attributes: [...first.attributes].map(a => `${a.name}=${a.value}`).slice(0, 10),
          inner_html_preview: first.innerHTML.substring(0, 500)
        };
      }

      const checks = [
        '.Card', '.Feed', '.ContentItem', '.TopstoryItem',
        '.QuestionItem', '.AnswerItem', '.ArticleItem',
        '[data-za-detail-view-element_name]'
      ];
      for (const sel of checks) {
        const count = document.querySelectorAll(sel).length;
        if (count > 0) result.selectors_found.push({ selector: sel, count });
      }

      return JSON.stringify(result, null, 2);
    })()

steps:
  - goto: "{{ url }}"
    wait_for: "body"
    timeout_ms: 15000

  - wait: 3000

  - eval:
      ref: dump_structure
      save_as: structure

  - output:
      structure: "{{ structure }}"
