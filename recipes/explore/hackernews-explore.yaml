name: "Hacker News Explore"
description: "Explore Hacker News HTML structure for feed extraction"
version: 1
type: query

scripts:
  dump_structure: |
    (() => {
      const rows = document.querySelectorAll('.athing');
      const result = {
        url: window.location.href,
        title: document.title,
        row_count: rows.length,
        selectors_found: [],
        sample_elements: []
      };

      const checks = [
        '.athing', '.titleline', '.titleline > a', '.subtext',
        '.score', '.age', '.sitebit', 'tr.spacer'
      ];
      for (const sel of checks) {
        const count = document.querySelectorAll(sel).length;
        if (count > 0) result.selectors_found.push({ selector: sel, count });
      }

      for (let i = 0; i < Math.min(rows.length, 2); i++) {
        const row = rows[i];
        const sub = row.nextElementSibling;
        result.sample_elements.push({
          row_html: row.innerHTML.substring(0, 400),
          subtext_html: sub ? sub.innerHTML.substring(0, 400) : ''
        });
      }
      return JSON.stringify(result, null, 2);
    })()

steps:
  - goto: "https://news.ycombinator.com"
    wait_for: ".athing"
  - eval: { ref: dump_structure, save_as: structure }
  - output: { structure: "{{ structure }}" }
