name: "Caixin Feed"
description: "Extract news articles from Caixin (财新)"
version: 2
type: query

config:
  default_timeout_ms: 60000
  default_on_error: continue

scripts:
  extract:
    async: true
    body: |
      (async () => {
        const results = [];
        const seen = new Set();
        for (const a of document.querySelectorAll('a')) {
          const href = a.getAttribute('href') || '';
          const text = a.textContent.trim();
          if (text.length < 8 || text.length > 120 || seen.has(text)) continue;
          // Match article URLs with date patterns
          if (!href.match(/\d{4}-\d{2}-\d{2}/) && !href.includes('/article/')) continue;
          seen.add(text);
          const url = href.startsWith('//') ? 'https:' + href :
            (href.startsWith('/') ? 'https://www.caixin.com' + href : href);
          const idMatch = href.match(/(\d{8,})/);
          const id = idMatch ? idMatch[1] : text.substring(0, 30);
          results.push({ id, title: text, url, preview: '' });
        }

        // Fetch top 15 articles for preview
        const top = results.slice(0, 15);
        const final = [];
        for (let i = 0; i < top.length; i += 5) {
          const batch = top.slice(i, i + 5);
          const fetches = batch.map(async (article) => {
            try {
              const resp = await fetch(article.url, { credentials: 'include' });
              const html = await resp.text();
              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');
              const bodyEl = doc.querySelector('article') || doc.querySelector('[class*="content"]');
              let preview = '';
              if (bodyEl) {
                const clone = bodyEl.cloneNode(true);
                clone.querySelectorAll('style, script').forEach(s => s.remove());
                preview = clone.textContent.trim().substring(0, 500);
              }
              return { ...article, preview };
            } catch (e) {
              return article;
            }
          });
          final.push(...await Promise.all(fetches));
        }
        for (let i = 15; i < results.length; i++) final.push(results[i]);
        return JSON.stringify(final);
      })()

steps:
  - goto: "https://www.caixin.com/"
    wait_for: "body"
  - wait: 5000
  - eval: { ref: extract, save_as: items }
  - output: { items: "{{ items }}" }
