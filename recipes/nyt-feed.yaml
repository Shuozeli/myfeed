name: "NYT Feed"
description: "Extract stories from New York Times homepage and section pages"
version: 2
type: query

config:
  default_timeout_ms: 120000
  default_on_error: continue

scripts:
  extract_articles:
    async: true
    body: |
      (async () => {
        const seen = new Set();
        const articles = [];

        function collectLinks(doc) {
          const selectors = ['.story-wrapper a', 'a[href*="/2026/"]', 'a[href*="/2025/"]', 'h3 a', 'h2 a'];
          for (const sel of selectors) {
            const links = doc.querySelectorAll(sel);
            for (const a of links) {
              try {
                const href = a.href || '';
                if (!href || seen.has(href)) continue;
                if (!href.includes('nytimes.com')) continue;
                if (href.match(/\/\d{4}\/\d{2}\/\d{2}\//) || href.includes('/interactive/') || href.includes('/live/')) {
                  seen.add(href);
                  const title = a.textContent.trim();
                  if (title.length < 5) continue;
                  const pathParts = new URL(href).pathname.split('/').filter(Boolean);
                  const id = pathParts[pathParts.length - 1]?.replace('.html', '') || String(seen.size);
                  articles.push({ id, title, url: href });
                }
              } catch (e) {}
            }
          }
        }

        // Step 1: Collect links from homepage
        collectLinks(document);

        // Step 2: Fetch section pages
        const sections = [
          'https://www.nytimes.com/section/technology',
          'https://www.nytimes.com/section/business',
          'https://www.nytimes.com/section/world',
          'https://www.nytimes.com/section/us',
          'https://www.nytimes.com/section/politics',
          'https://www.nytimes.com/section/science',
          'https://www.nytimes.com/section/health'
        ];

        for (let i = 0; i < sections.length; i += 3) {
          const batch = sections.slice(i, i + 3);
          const fetches = batch.map(async (url) => {
            try {
              const resp = await fetch(url, { credentials: 'include' });
              const html = await resp.text();
              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');
              collectLinks(doc);
            } catch (e) {}
          });
          await Promise.all(fetches);
        }

        // Helper: extract clean text
        const cleanTextOf = (el) => {
          const clone = el.cloneNode(true);
          clone.querySelectorAll('style, script, noscript, svg, img').forEach(s => s.remove());
          return clone.textContent.trim();
        };

        // Step 3: For top 50, fetch full article text
        const top = articles.slice(0, 50);
        const results = [];

        for (let i = 0; i < top.length; i += 5) {
          const batch = top.slice(i, i + 5);
          const fetches = batch.map(async (article) => {
            try {
              const resp = await fetch(article.url, { credentials: 'include' });
              const html = await resp.text();
              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');

              const bodyEl = doc.querySelector('[name="articleBody"]')
                || doc.querySelector('.meteredContent')
                || doc.querySelector('[class*="StoryBodyCompanion"]')
                || doc.querySelector('article');

              let preview = '';
              if (bodyEl) {
                preview = cleanTextOf(bodyEl).substring(0, 1000);
              }
              if (!preview) {
                const allP = doc.querySelectorAll('p');
                const texts = Array.from(allP)
                  .map(p => p.textContent.trim())
                  .filter(t => t.length > 30);
                preview = texts.join(' ').substring(0, 1000);
              }

              return { ...article, preview };
            } catch (e) {
              return { ...article, preview: '' };
            }
          });
          const batchResults = await Promise.all(fetches);
          results.push(...batchResults);
        }

        for (let i = 50; i < articles.length; i++) {
          results.push({ ...articles[i], preview: '' });
        }

        return JSON.stringify(results);
      })()

steps:
  - goto: "https://www.nytimes.com"
    wait_for: ".story-wrapper"
    timeout_ms: 20000

  - wait: 3000

  - eval:
      ref: extract_articles
      save_as: items

  - output:
      items: "{{ items }}"
