name: "InfoQ Feed"
description: "Extract articles and news from InfoQ with summaries from article pages"
version: 1
type: query

auth:
  required: false
  type: none
  strategy: public
  notes: "InfoQ is a public tech news site."

config:
  default_timeout_ms: 60000
  default_on_error: continue

scripts:
  extract_articles:
    async: true
    body: |
      (async () => {
        const results = [];
        const seen = new Set();

        // Collect article links from homepage
        const allLinks = document.querySelectorAll('a[href*="/news/"], a[href*="/articles/"]');
        const articles = [];

        for (const link of allLinks) {
          try {
            const href = link.getAttribute('href') || '';
            // Extract slug from path
            const match = href.match(/\/(news|articles)\/([^/?#]+)/);
            if (!match) continue;
            const slug = match[1] + '/' + match[2];
            if (seen.has(slug)) continue;
            seen.add(slug);

            const url = href.startsWith('http') ? href : 'https://www.infoq.com' + href;

            // Try to find title from link text or parent card
            const card = link.closest('[class*="card"]') || link.closest('[class*="news"]') || link.parentElement;
            let title = '';
            const headingEl = card ? (card.querySelector('h3') || card.querySelector('h2')) : null;
            if (headingEl) {
              title = headingEl.textContent.trim();
            }
            if (!title) {
              title = link.textContent.trim();
            }
            if (!title || title.length < 5) continue;

            articles.push({ id: slug, title, url, preview: '' });
          } catch (e) {}
        }

        // Fetch top 20 article pages for preview content
        const top = articles.slice(0, 20);
        for (let i = 0; i < top.length; i += 5) {
          const batch = top.slice(i, i + 5);
          const fetches = batch.map(async (article) => {
            try {
              const resp = await fetch(article.url);
              const html = await resp.text();
              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');

              const contentEl = doc.querySelector('[class*="article__content"]')
                || doc.querySelector('.body__content')
                || doc.querySelector('article');
              if (contentEl) {
                const paragraphs = contentEl.querySelectorAll('p');
                const texts = [];
                for (const p of paragraphs) {
                  const t = p.textContent.trim();
                  if (t) texts.push(t);
                  if (texts.join(' ').length > 500) break;
                }
                article.preview = texts.join(' ').substring(0, 500);
              }
            } catch (e) {}
            return article;
          });
          const batchResults = await Promise.all(fetches);
          for (const r of batchResults) {
            results.push(r);
          }
        }

        // Append remaining articles without preview
        for (let i = 20; i < articles.length; i++) {
          results.push(articles[i]);
        }

        return JSON.stringify(results);
      })()

steps:
  - goto: "https://www.infoq.com/"
    wait_for: "a"
    timeout_ms: 15000

  - eval:
      ref: extract_articles
      save_as: items

  - output:
      items: "{{ items }}"
