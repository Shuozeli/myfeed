repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check --all-targets
        language: system
        types: [rust]
        pass_filenames: false

      - id: no-credentials
        name: check for leaked credentials
        entry: 'bot\d{8,}:[A-Za-z0-9_-]{35}'
        language: pygrep
        types_or: [rust, toml, markdown, yaml]
        exclude: '(\.pre-commit-config\.yaml|\.env\.example)$'
