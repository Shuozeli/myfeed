name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
      - name: Install SQLite dev
        run: sudo apt-get install -y libsqlite3-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets
      - run: cargo clippy --all-targets

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
      - name: Install SQLite dev
        run: sudo apt-get install -y libsqlite3-dev
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        env:
          CDP_ENDPOINT: ws://localhost:9222
          DATABASE_URL: sqlite:///tmp/myfeed_test.db
          TELEGRAM_BOT_TOKEN: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
          TELEGRAM_CHAT_ID: "0"
          CRAWL_INTERVAL_SECS: "3600"
          ENABLED_SITES: hackernews,reddit
        run: cargo test

  integration-test:
    name: Integration Tests (Lightpanda)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Lightpanda
        run: |
          docker run -d --name lightpanda \
            -p 9222:9222 \
            --shm-size=256m \
            lightpanda/browser:nightly

      - name: Wait for Lightpanda
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:9222 > /dev/null 2>&1; then
              echo "Lightpanda is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Lightpanda failed to start"
          exit 1

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: myfeed:test

      - name: Run integration tests
        env:
          CDP_ENDPOINT: ws://localhost:9222
          DATABASE_URL: sqlite:///tmp/myfeed_test.db
          TELEGRAM_BOT_TOKEN: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
          TELEGRAM_CHAT_ID: "0"
          CRAWL_INTERVAL_SECS: "3600"
          ENABLED_SITES: hackernews,reddit
        run: |
          docker run --rm \
            --network host \
            -e RUST_BACKTRACE=1 \
            -e RUST_LOG=myfeed=debug \
            -e CDP_ENDPOINT=ws://localhost:9222 \
            -e DATABASE_URL=sqlite:///tmp/myfeed_test.db \
            -e TELEGRAM_BOT_TOKEN=123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11 \
            -e TELEGRAM_CHAT_ID=0 \
            -e CRAWL_INTERVAL_SECS=3600 \
            -e ENABLED_SITES=hackernews,reddit \
            -v "$(pwd):/app" \
            myfeed:test \
            cargo test --test integration -- --ignored --nocapture

      - name: Cleanup
        if: always()
        run: docker stop lightpanda || true

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
      - name: Install SQLite dev
        run: sudo apt-get install -y libsqlite3-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build documentation
        run: cargo doc --no-deps
        env:
          RUSTFLAGS: ""

  docker-test:
    name: Docker Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: myfeed:test

      - name: Run unit tests in Docker
        env:
          DATABASE_URL: sqlite:///tmp/myfeed_test.db
          CDP_ENDPOINT: ws://localhost:9222
          TELEGRAM_BOT_TOKEN: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
          TELEGRAM_CHAT_ID: "0"
          CRAWL_INTERVAL_SECS: "3600"
          ENABLED_SITES: hackernews,reddit
        run: |
          docker run --rm \
            -e RUST_BACKTRACE=1 \
            -e RUST_LOG=myfeed=debug \
            -e DATABASE_URL=sqlite:///tmp/myfeed_test.db \
            -e CDP_ENDPOINT=ws://localhost:9222 \
            -e TELEGRAM_BOT_TOKEN=123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11 \
            -e TELEGRAM_CHAT_ID=0 \
            -e CRAWL_INTERVAL_SECS=3600 \
            -e ENABLED_SITES=hackernews,reddit \
            -v "$(pwd):/app" \
            myfeed:test \
            cargo test --test cli
